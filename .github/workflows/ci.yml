name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "credentials/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# ───────────────────────────────────────────────────
# Job 1 — Test
# ───────────────────────────────────────────────────
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Compile check
        run: uv run python -m compileall -q main.py src

  # ───────────────────────────────────────────────────
  # Job 2 — Build & push image to GHCR
  # ───────────────────────────────────────────────────
  build-and-push:
    needs: test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/ansimran/zoho-desk-ticket-modifier/ticket-modifier:latest
          cache-from: type=registry,ref=ghcr.io/ansimran/zoho-desk-ticket-modifier/ticket-modifier:buildcache
          cache-to: type=registry,ref=ghcr.io/ansimran/zoho-desk-ticket-modifier/ticket-modifier:buildcache,mode=max
          provenance: false
          sbom: false
        env:
          SOURCE_DATE_EPOCH: 0

  # ───────────────────────────────────────────────────
  # Job 3 — Deploy to EC2
  # ───────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: true
    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.DEPLOY_HOST }}" || (echo "Missing secret: DEPLOY_HOST" && exit 1)
          test -n "${{ secrets.DEPLOY_USER }}" || (echo "Missing secret: DEPLOY_USER" && exit 1)
          test -n "${{ secrets.DEPLOY_GIT_PATH }}" || (echo "Missing secret: DEPLOY_GIT_PATH" && exit 1)
          test -n "${{ secrets.DEPLOY_SSH_KEY }}" || (echo "Missing secret: DEPLOY_SSH_KEY" && exit 1)
          test -n "${{ secrets.GHCR_USER }}" || (echo "Missing secret: GHCR_USER" && exit 1)
          test -n "${{ secrets.GHCR_TOKEN }}" || (echo "Missing secret: GHCR_TOKEN" && exit 1)

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          PORT="${{ secrets.DEPLOY_PORT }}"
          if [ -z "$PORT" ]; then PORT="22"; fi
          ssh-keyscan -p "$PORT" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Pull and deploy
        shell: bash
        run: |
          set -euo pipefail
          PORT="${{ secrets.DEPLOY_PORT }}"
          if [ -z "$PORT" ]; then PORT="22"; fi

          DEPLOY_GIT_PATH_B64="$(printf '%s' "${{ secrets.DEPLOY_GIT_PATH }}" | base64 -w0)"
          GHCR_USER_B64="$(printf '%s' "${{ secrets.GHCR_USER }}" | base64 -w0)"
          GHCR_TOKEN_B64="$(printf '%s' "${{ secrets.GHCR_TOKEN }}" | base64 -w0)"

          ssh -p "$PORT" -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "DEPLOY_GIT_PATH_B64='$DEPLOY_GIT_PATH_B64' GHCR_USER_B64='$GHCR_USER_B64' GHCR_TOKEN_B64='$GHCR_TOKEN_B64' bash -s" <<'EOS'
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          deploy_git_path="$(printf '%s' "$DEPLOY_GIT_PATH_B64" | base64 -d)"
          ghcr_user="$(printf '%s' "$GHCR_USER_B64" | base64 -d)"
          ghcr_token="$(printf '%s' "$GHCR_TOKEN_B64" | base64 -d)"

          cd "$deploy_git_path"

          git fetch --prune origin main
          git checkout main
          git reset --hard origin/main

          echo "$ghcr_token" | docker login ghcr.io -u "$ghcr_user" --password-stdin

          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f

          echo "Waiting for services to start..."
          sleep 5
          docker compose ps
          EOS
